<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake – En jeu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  :root {
    --bg:#080c14; --panel:#0d1420; --border:#1a2840;
    --accent:#00ff88; --accent2:#0088ff; --warn:#ffaa00;
    --danger:#ff4444; --text:#c8d8e8; --muted:#4a6080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; display:flex; flex-direction:column; }

  header { border-bottom:1px solid var(--border); padding:8px 16px; display:flex;
    align-items:center; gap:12px; background:rgba(13,20,32,.97); flex-shrink:0; height:46px; }
  .logo { font-family:'Orbitron',sans-serif; font-weight:900; font-size:1rem; color:var(--accent); letter-spacing:2px; }
  .logo span { color:var(--accent2); }
  .back { color:var(--muted); text-decoration:none; font-size:.78rem; transition:.2s; }
  .back:hover { color:var(--text); }
  .hud { display:flex; gap:16px; margin-left:auto; font-size:.78rem; align-items:center; }
  .hud-item { color:var(--muted); }
  .hud-item b { color:var(--accent); }
  #timerEl { color:var(--warn); font-weight:700; }
  #statusEl { color:var(--accent2); font-size:.72rem; }

  .main { display:flex; flex:1; overflow:hidden; min-height:0; }
  .game-area { flex:1; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  canvas { display:block; border:1px solid var(--border); border-radius:3px; image-rendering:pixelated; }
  #wallBorder { position:absolute; inset:0; pointer-events:none; border:3px solid var(--danger);
    border-radius:3px; opacity:0; transition:.3s; z-index:5; }
  #wallBorder.active { opacity:.55; }

  .sidebar { width:230px; flex-shrink:0; border-left:1px solid var(--border); background:var(--panel); display:flex; flex-direction:column; overflow:hidden; }
  .sb-section { padding:12px 14px; border-bottom:1px solid var(--border); }
  .sb-title { font-family:'Orbitron',sans-serif; font-size:.65rem; color:var(--muted); letter-spacing:2px; margin-bottom:8px; }
  .player-row { display:flex; align-items:center; gap:7px; padding:3px 0; font-size:.76rem; }
  .pdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .pname { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pscore { color:var(--accent); }
  .pdead { opacity:.35; text-decoration:line-through; }

  .settings-scroll { flex:1; overflow-y:auto; padding:12px 14px; }
  .field { margin-bottom:10px; }
  .field label { display:block; font-size:.68rem; color:var(--muted); margin-bottom:3px; }
  .field input[type=number] { width:100%; background:rgba(0,255,136,.06); border:1px solid var(--border);
    border-radius:5px; padding:5px 8px; color:var(--accent); font-family:inherit; font-size:.8rem; outline:none; transition:.15s; }
  .field input[type=number]:focus { border-color:var(--accent); }
  .field input[type=number]:disabled { opacity:.4; cursor:not-allowed; }
  .btn { display:block; width:100%; padding:8px; border:none; border-radius:6px; font-family:inherit;
    font-size:.78rem; cursor:pointer; font-weight:700; letter-spacing:1px; transition:.15s; margin-bottom:6px; text-align:center; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { background:#00cc70; }
  .btn-green { background:linear-gradient(135deg,#00cc66,#00aa44); color:#000; font-size:.85rem; padding:10px; }
  .btn-green:hover { background:linear-gradient(135deg,#00ff88,#00cc55); }
  .btn-outline { background:transparent; border:1px solid var(--accent2); color:var(--accent2); }
  .ratio-row { display:flex; gap:5px; margin-bottom:8px; }
  .ratio-row .btn { flex:1; margin-bottom:0; font-size:.7rem; padding:6px 4px; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .toggle-row label { font-size:.68rem; color:var(--muted); }
  .toggle { position:relative; width:38px; height:20px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:20px; cursor:pointer; transition:.2s; }
  .toggle-slider:before { content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:#666; border-radius:50%; transition:.2s; }
  .toggle input:checked + .toggle-slider { background:var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform:translateX(18px); background:#000; }
  .toggle input:disabled + .toggle-slider { opacity:.4; cursor:not-allowed; }

  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; background:rgba(8,12,20,.88); backdrop-filter:blur(5px); z-index:20; }
  .overlay.hidden { display:none; }
  #ovCountdown { background:rgba(8,12,20,.55); backdrop-filter:blur(1px); }
  .ov-title { font-family:'Orbitron',sans-serif; font-size:1.8rem; font-weight:900; text-align:center; }
  .ov-sub { color:var(--muted); font-size:.85rem; text-align:center; max-width:340px; line-height:1.6; }
  .countdown-num { font-family:'Orbitron',sans-serif; font-size:6rem; font-weight:900;
    color:var(--warn); text-shadow:0 0 40px rgba(255,170,0,.7); animation:pop .6s ease-out; }
  @keyframes pop { from{transform:scale(1.5);opacity:0} to{transform:scale(1);opacity:1} }
  .lobby-player-list { background:rgba(0,0,0,.3); border:1px solid var(--border); border-radius:8px; padding:10px 14px; min-width:260px; max-width:340px; }
  .lp-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:.82rem; border-bottom:1px solid rgba(26,40,64,.6); }
  .lp-row:last-child { border-bottom:none; }
  .lp-dot { width:10px; height:10px; border-radius:50%; }
  .lp-crown { font-size:.8rem; margin-left:auto; }
  .go-table { background:rgba(13,20,32,.9); border:1px solid var(--border); border-radius:10px; padding:18px 22px; min-width:280px; }
  .go-row { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(26,40,64,.6); font-size:.85rem; }
  .go-row:last-child { border-bottom:none; }
  .go-rank { width:26px; color:var(--warn); }
  .go-name { flex:1; }
  .go-pts { color:var(--accent); }

  .dpad { display:none; }
  @media (max-width:640px) {
    .sidebar { display:none; }
    .dpad { display:grid; grid-template-columns:52px 52px 52px; grid-template-rows:52px 52px; gap:4px; position:fixed; bottom:14px; right:14px; z-index:30; }
    .dpad button { background:rgba(13,20,32,.85); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:1.2rem; cursor:pointer; touch-action:manipulation; }
    .dpad .up { grid-column:2; }
    .dpad .left { grid-row:2; grid-column:1; }
    .dpad .down { grid-row:2; grid-column:2; }
    .dpad .right { grid-row:2; grid-column:3; }
  }

  #notifStack { position:fixed; top:54px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:6px; z-index:200; pointer-events:none; }
  .notif { font-size:.82rem; padding:9px 18px; border-radius:8px; opacity:0; white-space:nowrap;
    transform:translateY(-8px); transition:.25s; border:1px solid; max-width:90vw; }
  .notif.show { opacity:1; transform:translateY(0); }
  .notif-info    { background:rgba(0,136,255,.18); border-color:rgba(0,136,255,.5); color:#88ccff; }
  .notif-success { background:rgba(0,255,136,.15); border-color:rgba(0,255,136,.45); color:#00ff88; }
  .notif-warn    { background:rgba(255,170,0,.15);  border-color:rgba(255,170,0,.45);  color:#ffaa00; }
  .notif-danger  { background:rgba(255,68,68,.15);   border-color:rgba(255,68,68,.45);   color:#ff6666; }
</style>
</head>
<body>
<header>
  <a href="index2.html" class="back">← Retour</a>
  <div class="logo">🐍 SNAKE <span>MULTI</span></div>
  <div class="hud">
    <div class="hud-item">Score&nbsp;<b id="myScoreEl">0</b></div>
    <div class="hud-item">Joueurs&nbsp;<b id="playerCountEl">0</b></div>
    <div id="timerEl"></div>
    <div id="statusEl"></div>
  </div>
</header>

<div class="main">
  <div class="game-area" id="gameArea">
    <canvas id="canvas"></canvas>
    <div id="wallBorder"></div>

    <div class="overlay" id="ovWaiting">
      <div class="ov-title" style="color:var(--accent)">EN ATTENTE</div>
      <div class="ov-sub">Joueurs dans le lobby :</div>
      <div class="lobby-player-list" id="waitingList"></div>
      <div id="startBtnArea"></div>
      <div class="ov-sub" id="waitingHint" style="font-size:.72rem"></div>
    </div>

    <div class="overlay hidden" id="ovCountdown">
      <div class="ov-sub">La partie commence dans</div>
      <div class="countdown-num" id="cdNum">3</div>
    </div>

    <div class="overlay hidden" id="ovDead">
      <div class="ov-title" style="color:var(--danger)">ÉLIMINÉ</div>
      <div class="ov-sub">Vous observez la suite...</div>
    </div>

    <div class="overlay hidden" id="ovGameOver">
      <div class="ov-title" style="color:var(--warn)">PARTIE TERMINÉE</div>
      <div class="go-table" id="goTable"></div>
      <div class="ov-sub" style="font-size:.72rem">Nouvelle partie dans quelques secondes...</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">SCORES</div>
      <div id="scoreList"></div>
    </div>
    <div class="settings-scroll">
      <div class="sb-title">PARAMÈTRES</div>
      <div id="settingFields"></div>
      <div id="creatorBtns" style="display:none">
        <button class="btn btn-primary" onclick="applySettings()">✓ Appliquer</button>
        <button class="btn btn-green"   onclick="startGame()">▶ Lancer la partie</button>
      </div>
      <div id="guestHint" style="display:none;font-size:.68rem;color:var(--muted);margin-top:6px">
        Seul le créateur peut modifier les paramètres.
      </div>
    </div>
  </div>
</div>

<div class="dpad">
  <button class="up"    onclick="sendDir(0,-1)">▲</button>
  <button class="left"  onclick="sendDir(-1,0)">◄</button>
  <button class="down"  onclick="sendDir(0,1)">▼</button>
  <button class="right" onclick="sendDir(1,0)">►</button>
</div>

<div id="notifStack"></div>

<script>
// ══════════════════════════════════════════════════════════
// INIT depuis URL params
// ══════════════════════════════════════════════════════════
const params    = new URLSearchParams(location.search);
const LOBBY_ID  = params.get('lobby') || sessionStorage.getItem('lobbyId') || '';
const SERVER_URL = params.get('server') || sessionStorage.getItem('serverUrl') || '';
const myName    = params.get('name')   || sessionStorage.getItem('playerName') || localStorage.getItem('snakeName') || 'Joueur';

if (!LOBBY_ID || !SERVER_URL) { window.location.href = 'index2.html'; }

const socket = io(SERVER_URL, { transports:['websocket','polling'] });

let mySid     = null;
let isCreator = false;
let settings  = {};
let status    = 'waiting';
let gameState = null;
let myAlive   = true;
let deadShown = false;

const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const gameArea = document.getElementById('gameArea');
let CELL = 20, gridW = 25, gridH = 18;

function resizeCanvas() {
  const W = gameArea.clientWidth - 2, H = gameArea.clientHeight - 2;
  CELL = Math.max(8, Math.min(40, Math.floor(W/gridW), Math.floor(H/gridH)));
  canvas.width  = gridW * CELL;
  canvas.height = gridH * CELL;
}
window.addEventListener('resize', resizeCanvas);

// ══════════════════════════════════════════════════════════
// SOCKET
// ══════════════════════════════════════════════════════════
socket.on('connect', () => {
  mySid = socket.id;
  socket.emit('set_name', { name: myName });
  socket.emit('join_lobby', { lobby_id: LOBBY_ID });
});

socket.on('lobby_joined', (data) => {
  isCreator = data.is_creator;
  settings  = data.settings;
  gridW = settings.grid_w; gridH = settings.grid_h;
  resizeCanvas();
  applySettingsToUI(settings);
  updateWaitingList(data.waiting_players);
  showCreatorUI();
  showOverlay('waiting');
  document.getElementById('statusEl').textContent = 'EN ATTENTE';
});

socket.on('spectate_mode', (data) => {
  isCreator = false;
  settings  = data.settings;
  gridW = settings.grid_w; gridH = settings.grid_h;
  resizeCanvas();
  applySettingsToUI(data.settings, false);
  status = data.state.status;
  gameState = data.state;
  showOverlay('none');
  document.getElementById('statusEl').textContent = '👁 SPECTATEUR';
});

socket.on('player_joined', (data) => updateWaitingList(data.waiting_players));

socket.on('player_left', (data) => {
  if (data.waiting_players !== undefined) updateWaitingList(data.waiting_players);
  if (data.name) showNotif(`← ${data.name} a quitté`, 'warn', 3000);
});

socket.on('new_creator', (data) => {
  if (data.sid === mySid) {
    isCreator = true; showCreatorUI();
    showNotif('👑 Vous êtes maintenant le créateur !', 'warn', 5000);
  } else if (data.name) {
    showNotif(`👑 ${data.name} est le nouveau créateur`, 'info', 3500);
  }
});

socket.on('lobby_settings', (data) => {
  settings = data; gridW = data.grid_w; gridH = data.grid_h;
  resizeCanvas(); applySettingsToUI(data, isCreator);
  updateWallBorder(data.wrap_walls !== false);
});

socket.on('game_starting', () => {
  document.getElementById('statusEl').textContent = 'DÉMARRAGE...';
});

socket.on('countdown', (data) => {
  if (data.snapshot) {
    gameState = data.snapshot;
    gridW = settings.grid_w || gridW; gridH = settings.grid_h || gridH;
    resizeCanvas(); lastDrawState = data.snapshot;
  }
  showOverlay('countdown');
  const el = document.getElementById('cdNum');
  el.textContent = data.seconds;
  el.style.animation = 'none'; void el.offsetWidth;
  el.style.animation = 'pop .6s ease-out';
});

socket.on('game_state', (state) => {
  gameState = state; status = state.status;
  if (status === 'playing') {
    showOverlay('none');
    document.getElementById('statusEl').textContent = '▶ EN JEU';
  }
  const tl = state.time_left;
  const te = document.getElementById('timerEl');
  if (tl >= 0) { te.textContent='⏱ '+tl+'s'; te.style.color=tl<15?'var(--danger)':'var(--warn)'; }
  else te.textContent='';
  const me = state.players[mySid];
  if (me) {
    document.getElementById('myScoreEl').textContent = me.score;
    if (!me.alive && myAlive) {
      myAlive = false;
      if (!deadShown) { deadShown=true; showOverlay('dead'); setTimeout(()=>{ if(status==='playing') showOverlay('none'); },2500); }
    }
  }
  document.getElementById('playerCountEl').textContent = Object.keys(state.players).length;
  renderScoreList(state.players);
});

socket.on('game_over', (data) => {
  status = 'finished';
  document.getElementById('statusEl').textContent = 'TERMINÉ';
  renderGameOver(data);
  showOverlay('gameover');
});

socket.on('lobby_restarted', (data) => {
  status='waiting'; gameState=null; lastDrawState=null; myAlive=true; deadShown=false;
  settings=data.settings; gridW=settings.grid_w; gridH=settings.grid_h;
  resizeCanvas(); applySettingsToUI(settings,isCreator);
  updateWallBorder(settings.wrap_walls!==false);
  updateWaitingList(data.waiting_players);
  showCreatorUI(); showOverlay('waiting');
  document.getElementById('statusEl').textContent='EN ATTENTE';
  showNotif('🔄 Nouvelle partie !', 'success', 3500);
});

socket.on('error', (data) => {
  if (data.msg === 'Lobby introuvable') window.location.href = 'index2.html';
  else showNotif(data.msg, 'danger');
});

socket.on('disconnect', () => showNotif('Connexion perdue', 'danger'));

// ══════════════════════════════════════════════════════════
// DESSIN (identique à game.html)
// ══════════════════════════════════════════════════════════
function hexToRgb(hex) {
  if (!hex||typeof hex!=='string') return {r:100,g:200,b:100};
  if (hex.startsWith('rgb')) { const m=hex.match(/\d+/g); return m&&m.length>=3?{r:+m[0],g:+m[1],b:+m[2]}:{r:100,g:200,b:100}; }
  const h=hex.replace('#',''); if(h.length<6) return {r:100,g:200,b:100};
  return {r:parseInt(h.slice(0,2),16)||0,g:parseInt(h.slice(2,4),16)||0,b:parseInt(h.slice(4,6),16)||0};
}
function getSkinColor(skin,baseCol,idx){
  if(!skin||skin.length===0) return baseCol;
  let patLen=0; for(let k=skin.length-1;k>=0;k--){if(skin[k]){patLen=k+1;break;}}
  if(patLen===0) return baseCol;
  return (skin[idx%patLen]&&skin[idx%patLen].length>0)?skin[idx%patLen]:baseCol;
}
function sqPath(c,x,y,sz,r){
  c.beginPath(); c.moveTo(x+r,y); c.lineTo(x+sz-r,y); c.quadraticCurveTo(x+sz,y,x+sz,y+r);
  c.lineTo(x+sz,y+sz-r); c.quadraticCurveTo(x+sz,y+sz,x+sz-r,y+sz);
  c.lineTo(x+r,y+sz); c.quadraticCurveTo(x,y+sz,x,y+sz-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}
function drawIdle(){
  const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height)*.7);
  bg.addColorStop(0,'#0d1525'); bg.addColorStop(1,'#070b12');
  ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let x=CELL/2;x<canvas.width;x+=CELL) for(let y=CELL/2;y<canvas.height;y+=CELL){ctx.beginPath();ctx.arc(x,y,1.2,0,Math.PI*2);ctx.fill();}
  if(settings.wrap_walls===false) drawWalls();
}
function drawWalls(){
  ctx.save(); ctx.shadowColor='rgba(255,50,50,.8)'; ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(255,60,60,.7)'; ctx.lineWidth=3; ctx.setLineDash([8,5]);
  ctx.strokeRect(2,2,canvas.width-4,canvas.height-4); ctx.setLineDash([]); ctx.shadowBlur=0; ctx.restore();
}
function drawFood(food){
  for(const f of food){
    const cx=f[0]*CELL+CELL/2,cy=f[1]*CELL+CELL/2,r=CELL*.38;
    const pulse=.7+.3*Math.sin(Date.now()/400+cx+cy);
    const h=ctx.createRadialGradient(cx,cy,0,cx,cy,r*3.5*pulse);
    h.addColorStop(0,'rgba(255,100,100,.25)');h.addColorStop(.5,'rgba(255,60,60,.08)');h.addColorStop(1,'rgba(255,60,60,0)');
    ctx.fillStyle=h;ctx.beginPath();ctx.arc(cx,cy,r*3.5*pulse,0,Math.PI*2);ctx.fill();
    const fg=ctx.createRadialGradient(cx-r*.3,cy-r*.3,0,cx,cy,r);
    fg.addColorStop(0,'#ffdddd');fg.addColorStop(.3,'#ff6666');fg.addColorStop(1,'#cc1111');
    ctx.fillStyle=fg;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.beginPath();ctx.arc(cx-r*.3,cy-r*.3,r*.28,0,Math.PI*2);ctx.fill();
  }
}
function drawSnake(p,isMe){
  if(!p.body||p.body.length===0) return;
  const alive=p.alive, skin=(p.skin&&p.skin.some(c=>c))?p.skin:null;
  const baseCol=(p.color&&p.color[0]==='#')?p.color:'#00ff88';
  const {r:br,g:bg,b:bb}=hexToRgb(baseCol);
  const pad=Math.max(1,CELL*.08), sz=CELL-pad*2, cr2=Math.max(2,sz*.28);
  for(let i=p.body.length-1;i>=0;i--){
    const [bx,by]=p.body[i], cx=bx*CELL+CELL/2, cy=by*CELL+CELL/2;
    const x=cx-sz/2, y=cy-sz/2;
    const t=i/Math.max(1,p.body.length-1), alpha=alive?Math.max(.45,1-t*.3):.2;
    let cr,cg,cb,colHex;
    if(!alive){cr=68;cg=72;cb=90;colHex='#44485a';}
    else if(skin){colHex=getSkinColor(skin,baseCol,i);const rgb=hexToRgb(colHex);cr=rgb.r;cg=rgb.g;cb=rgb.b;}
    else{const d=t*50;cr=Math.max(0,br-d);cg=Math.max(0,bg-d);cb=Math.max(0,bb-d);colHex=baseCol;}
    ctx.save();
    if(i===0&&alive){ctx.shadowColor=colHex;ctx.shadowBlur=isMe?16:8;}
    const grad=ctx.createLinearGradient(x,y,x+sz,y+sz);
    grad.addColorStop(0,`rgba(${Math.min(255,cr+55)},${Math.min(255,cg+55)},${Math.min(255,cb+55)},${alpha})`);
    grad.addColorStop(.5,`rgba(${cr},${cg},${cb},${alpha})`);
    grad.addColorStop(1,`rgba(${Math.max(0,cr-35)},${Math.max(0,cg-35)},${Math.max(0,cb-35)},${alpha})`);
    ctx.fillStyle=grad; sqPath(ctx,x,y,sz,cr2); ctx.fill();
    if(alive){ctx.fillStyle=`rgba(255,255,255,${.15*alpha})`;ctx.beginPath();ctx.moveTo(x+cr2,y);ctx.lineTo(x+sz*.55,y);ctx.quadraticCurveTo(x+sz*.55,y+sz*.38,x,y+sz*.38);ctx.lineTo(x,y+cr2);ctx.quadraticCurveTo(x,y,x+cr2,y);ctx.closePath();ctx.fill();}
    if(i===0&&isMe&&alive){ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;sqPath(ctx,x,y,sz,cr2);ctx.stroke();}
    ctx.restore();
    if(i===0&&alive){
      const [dx,dy]=p.direction||[1,0],px=-dy,py=dx,er=Math.max(2,sz*.14),ef=sz*.18,ed=sz*.22;
      for(const side of[1,-1]){
        const ex=cx+dx*ef+px*ed*side,ey=cy+dy*ef+py*ed*side;
        ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex+dx*er*.3,ey+dy*er*.3,er*.55,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(ex-er*.2,ey-er*.2,er*.25,0,Math.PI*2);ctx.fill();
      }
    }
  }
  if(alive&&p.body[0]){
    const hx=p.body[0][0]*CELL+CELL/2,hy=p.body[0][1]*CELL-4,fs=Math.max(10,Math.floor(CELL*.52));
    ctx.save();ctx.font=`bold ${fs}px 'Share Tech Mono',monospace`;ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillText((isMe?'▶ ':'')+p.name.slice(0,12),hx+1,hy+1);
    const nc=skin?getSkinColor(skin,baseCol,0):baseCol;ctx.fillStyle=isMe?'#ffffff':nc;ctx.globalAlpha=.92;
    ctx.fillText((isMe?'▶ ':'')+p.name.slice(0,12),hx,hy);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';ctx.restore();
  }
}
let lastDrawState=null;
function drawGame(state){
  lastDrawState=state; drawIdle();
  drawFood(state.food||[]);
  const entries=Object.entries(state.players||{});
  for(const[sid,p] of [...entries.filter(([,p])=>!p.alive),...entries.filter(([,p])=>p.alive)])
    drawSnake(p,sid===mySid);
}
function animLoop(){
  if(lastDrawState&&(status==='playing'||status==='countdown')) drawGame(lastDrawState);
  else if(!lastDrawState) drawIdle();
  requestAnimationFrame(animLoop);
}
animLoop();

// ══════════════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════════════
function showOverlay(name){
  ['ovWaiting','ovCountdown','ovDead','ovGameOver'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  if(name==='waiting')   document.getElementById('ovWaiting').classList.remove('hidden');
  if(name==='countdown') document.getElementById('ovCountdown').classList.remove('hidden');
  if(name==='dead')      document.getElementById('ovDead').classList.remove('hidden');
  if(name==='gameover')  document.getElementById('ovGameOver').classList.remove('hidden');
}
function updateWaitingList(list){
  const el=document.getElementById('waitingList');
  if(!list||list.length===0){el.innerHTML='<div style="color:var(--muted);font-size:.78rem">Personne...</div>';return;}
  el.innerHTML=list.map(p=>`
    <div class="lp-row">
      <div class="lp-dot" style="background:${p.color}"></div>
      <span style="font-size:.8rem">${esc(p.name)}</span>
      ${settings.creator_sid===p.sid?'<span class="lp-crown">👑</span>':''}
    </div>`).join('');
  document.getElementById('playerCountEl').textContent=list.length;
}
function showCreatorUI(){
  document.getElementById('creatorBtns').style.display=isCreator?'block':'none';
  document.getElementById('guestHint').style.display=isCreator?'none':'block';
  document.getElementById('startBtnArea').innerHTML=isCreator
    ?'<button onclick="startGame()" style="background:var(--accent);color:#000;border:none;border-radius:8px;padding:11px 28px;font-family:inherit;font-size:.9rem;font-weight:700;letter-spacing:1px;cursor:pointer">▶ Lancer la partie</button>'
    :'';
  document.getElementById('waitingHint').textContent=isCreator
    ?'Configurez les paramètres puis lancez !'
    :'En attente que le créateur lance...';
}
const NUM_FIELDS=[
  {key:'grid_w',label:'Largeur grille',min:2},
  {key:'grid_h',label:'Hauteur grille',min:2},
  {key:'food_count',label:'Nourriture',min:1},
  {key:'tick_rate',label:'Vitesse (tick/s)',min:1},
  {key:'max_players',label:'Max joueurs',min:2},
  {key:'duration',label:'Durée en s (0=∞)',min:0},
];
function applySettingsToUI(s,editable=null){
  const canEdit=(editable!==null)?editable:isCreator;
  let html=NUM_FIELDS.map(f=>`<div class="field"><label>${f.label}</label><input type="number" id="f_${f.key}" value="${s[f.key]??0}" min="${f.min}" ${canEdit?'':'disabled'} oninput="onFieldChange()"></div>`).join('');
  if(canEdit) html+=`<div class="ratio-row"><button class="btn btn-outline" onclick="setRatio('1:1')">⬛ 1:1</button><button class="btn btn-outline" onclick="setRatio('16:9')">▬ 16:9</button><button class="btn btn-outline" onclick="setRatio('4:3')">▭ 4:3</button></div>`;
  const wc=(s.wrap_walls!==false)?'checked':'';
  html+=`<div class="toggle-row"><label>Passer à travers les murs</label><label class="toggle"><input type="checkbox" id="f_wrap_walls" ${wc} ${canEdit?'':'disabled'} onchange="onFieldChange()"><span class="toggle-slider"></span></label></div>`;
  document.getElementById('settingFields').innerHTML=html;
  updateWallBorder(s.wrap_walls!==false);
}
function setRatio(r){
  if(!isCreator) return;
  const w=parseInt(document.getElementById('f_grid_w').value)||25;
  const h=document.getElementById('f_grid_h');
  const map={'1:1':[1,1],'16:9':[16,9],'4:3':[4,3]};
  h.value=Math.max(2,Math.round(w*map[r][1]/map[r][0]));
  onFieldChange();
}
function updateWallBorder(wrap){ document.getElementById('wallBorder').classList.toggle('active',!wrap); }
let sDebounce=null;
function onFieldChange(){ if(!isCreator) return; clearTimeout(sDebounce); sDebounce=setTimeout(applySettings,300); }
function applySettings(){
  if(!isCreator) return;
  const data={};
  for(const f of NUM_FIELDS){ const el=document.getElementById('f_'+f.key); if(el){const v=parseInt(el.value);data[f.key]=isNaN(v)?0:v;} }
  const w=document.getElementById('f_wrap_walls'); if(w) data.wrap_walls=w.checked;
  socket.emit('update_settings',data);
}
function startGame(){ socket.emit('start_game'); }
function sendDir(dx,dy){ socket.emit('direction',{direction:[dx,dy]}); }
function renderScoreList(players){
  document.getElementById('scoreList').innerHTML=Object.entries(players).sort((a,b)=>b[1].score-a[1].score).map(([sid,p])=>`
    <div class="player-row ${!p.alive?'pdead':''}">
      <div class="pdot" style="background:${p.color}"></div>
      <div class="pname">${sid===mySid?'▶ ':''}${esc(p.name)}</div>
      <div class="pscore">${p.score}</div>
    </div>`).join('');
}
function renderGameOver(data){
  const pn=data.players||{},sc=data.scores||{},m=['🥇','🥈','🥉'];
  document.getElementById('goTable').innerHTML=
    '<div style="font-family:Orbitron,sans-serif;font-size:.72rem;color:var(--muted);letter-spacing:2px;margin-bottom:12px;text-align:center">RÉSULTATS FINAUX</div>'+
    Object.entries(sc).sort((a,b)=>b[1]-a[1]).map(([sid,pts],i)=>`
      <div class="go-row"><div class="go-rank">${m[i]||'#'+(i+1)}</div>
      <div class="go-name" style="color:${sid===mySid?'var(--warn)':'var(--text)'}">${esc(pn[sid]||'?')}</div>
      <div class="go-pts">${pts} pts</div></div>`).join('');
}
function showNotif(msg,type='info',duration=4000){
  const el=document.createElement('div'); el.className=`notif notif-${type}`; el.textContent=msg;
  document.getElementById('notifStack').appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},duration);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.addEventListener('keydown',e=>{
  if(status!=='playing') return;
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],KeyW:[0,-1],KeyS:[0,1],KeyA:[-1,0],KeyD:[1,0]};
  const d=map[e.code]; if(d){e.preventDefault();sendDir(d[0],d[1]);}
});

resizeCanvas(); showOverlay('waiting');
</script>
