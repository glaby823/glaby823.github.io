<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake P2P</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--bg:#080c14;--panel:#0d1420;--border:#1a2840;--accent:#00ff88;--accent2:#0088ff;--warn:#ffaa00;--danger:#ff4444;--text:#c8d8e8;--muted:#4a6080;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.015) 2px,rgba(0,255,136,.015) 4px);z-index:9999;}
header{border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px;background:rgba(13,20,32,.95);position:sticky;top:0;z-index:100;}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.3rem;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px rgba(0,255,136,.4);}
.logo span{color:var(--accent2);}
.badge{font-size:.7rem;border:1px solid var(--border);border-radius:4px;padding:2px 9px;margin-left:auto;}
.badge.ok{color:var(--accent);border-color:rgba(0,255,136,.35);}
.badge.err{color:var(--danger);border-color:rgba(255,68,68,.35);}
.badge.wait{color:var(--warn);border-color:rgba(255,170,0,.35);}
.container{max-width:960px;margin:0 auto;padding:28px 20px;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:22px 26px;margin-bottom:20px;}
.panel-title{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--muted);letter-spacing:2px;margin-bottom:14px;}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.field-row label{color:var(--muted);font-size:.78rem;min-width:80px;}
.field-row input{flex:1;background:rgba(0,255,136,.05);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--accent);font-family:inherit;font-size:.88rem;outline:none;transition:.2s;}
.field-row input:focus{border-color:var(--accent);}
.btn{padding:9px 18px;border:none;border-radius:8px;font-family:inherit;font-size:.82rem;cursor:pointer;transition:.15s;font-weight:700;letter-spacing:1px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#000;}.btn-primary:not(:disabled):hover{background:#00cc70;transform:translateY(-1px);}
.btn-secondary{background:transparent;border:1px solid var(--accent2);color:var(--accent2);}.btn-secondary:hover{background:rgba(0,136,255,.1);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.section-title{font-family:'Orbitron',sans-serif;font-size:.78rem;color:var(--muted);letter-spacing:2px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.lobby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.lobby-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;transition:.2s;cursor:pointer;}
.lobby-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,136,255,.12);}
.lbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:700;margin-bottom:8px;}
.lbadge-open{background:rgba(0,136,255,.2);color:var(--accent2);border:1px solid rgba(0,136,255,.3);}
.lbadge-playing{background:rgba(0,255,136,.2);color:var(--accent);border:1px solid rgba(0,255,136,.3);}
.lbadge-full{background:rgba(255,170,0,.2);color:var(--warn);border:1px solid rgba(255,170,0,.3);}
.lobby-card h3{font-size:.88rem;margin-bottom:5px;}
.lobby-card p{font-size:.72rem;color:var(--muted);line-height:1.8;}
.empty-state{text-align:center;color:var(--muted);padding:50px 20px;}
.empty-state .big{font-size:2.8rem;margin-bottom:10px;}
#notifStack{position:fixed;top:58px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;z-index:500;pointer-events:none;}
.notif{font-size:.82rem;padding:9px 18px;border-radius:8px;opacity:0;white-space:nowrap;transform:translateY(-8px);transition:.25s;border:1px solid;max-width:90vw;text-align:center;}
.notif.show{opacity:1;transform:translateY(0);}
.notif-info{background:rgba(0,136,255,.18);border-color:rgba(0,136,255,.5);color:#88ccff;}
.notif-success{background:rgba(0,255,136,.15);border-color:rgba(0,255,136,.45);color:#00ff88;}
.notif-warn{background:rgba(255,170,0,.15);border-color:rgba(255,170,0,.45);color:#ffaa00;}
.notif-danger{background:rgba(255,68,68,.15);border-color:rgba(255,68,68,.45);color:#ff6666;}
#myId{font-size:.66rem;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">🐍 SNAKE <span>P2P</span></div>
  <span class="badge wait" id="badge">⬤ démarrage...</span>
</header>
<div id="notifStack"></div>
<div class="container">
  <div class="panel">
    <div class="panel-title">VOTRE PROFIL</div>
    <div class="field-row">
      <label>NOM :</label>
      <input type="text" id="nameInput" maxlength="20" placeholder="Votre pseudo...">
    </div>
    <div id="myId"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="saveName()">✓ Sauvegarder</button>
      <button class="btn btn-primary" id="createBtn" onclick="createLobby()" disabled>+ Créer une partie</button>
      <button class="btn btn-secondary" onclick="refresh()">↻ Actualiser</button>
    </div>
  </div>
  <div class="section-title">PARTIES EN COURS</div>
  <div class="lobby-grid" id="grid">
    <div class="empty-state"><div class="big">🐍</div>Connexion P2P en cours...</div>
  </div>
</div>
<script>
const LS_LOBBIES = 'snakep2p_lobbies_v3';
const COLORS = ['#00ff88','#ff4444','#4488ff','#ffaa00','#ff44ff','#44ffff','#ffff44','#ff8800'];
let peer = null, myId = null;
let myName = localStorage.getItem('snakeName') || '';
document.getElementById('nameInput').value = myName;

// ── Peer ──────────────────────────────────────────────────
function initPeer() {
  setBadge('wait', '⬤ connexion...');
  // Utiliser le serveur PeerJS public (0.peerjs.com)
  peer = new Peer({
    config: {iceServers:[
      {urls:'stun:stun.l.google.com:19302'},
      {urls:'stun:stun2.l.google.com:19302'},
    ]}
  });
  peer.on('open', id => {
    myId = id;
    setBadge('ok', '⬤ connecté · ' + id.slice(0,8) + '...');
    document.getElementById('myId').textContent = 'ID : ' + id;
    document.getElementById('createBtn').disabled = false;
    showNotif('P2P prêt', 'success', 2000);
    refresh();
  });
  peer.on('error', e => {
    if (e.type === 'peer-unavailable') return;
    setBadge('err', '⬤ erreur : ' + e.type);
    showNotif('Erreur P2P : ' + e.type, 'danger');
  });
  peer.on('disconnected', () => {
    setBadge('err', '⬤ déconnecté — reconnexion...');
    setTimeout(() => peer.reconnect(), 2000);
  });
}

function setBadge(cls, txt) {
  const el = document.getElementById('badge');
  el.className = 'badge ' + cls; el.textContent = txt;
}

// ── Lobby registry (localStorage) ─────────────────────────
function getLobbies() {
  try { return JSON.parse(localStorage.getItem(LS_LOBBIES) || '{}'); } catch { return {}; }
}
function saveLobbyEntry(info) {
  const all = getLobbies(); all[info.id] = {...info, ts: Date.now()};
  localStorage.setItem(LS_LOBBIES, JSON.stringify(all));
}
function removeLobbyEntry(id) {
  const all = getLobbies(); delete all[id];
  localStorage.setItem(LS_LOBBIES, JSON.stringify(all));
}

function refresh() {
  const all = getLobbies(), now = Date.now();
  // Supprimer entrées trop vieilles (> 20s sans heartbeat)
  let changed = false;
  for (const [id, l] of Object.entries(all)) {
    if (now - l.ts > 20000) { delete all[id]; changed = true; }
  }
  if (changed) localStorage.setItem(LS_LOBBIES, JSON.stringify(all));
  renderLobbies(Object.values(all).filter(l => l.id !== myId));
}

function renderLobbies(list) {
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">🐍</div>Aucune partie.<br>Créez-en une !</div>';
    return;
  }
  grid.innerHTML = list.sort((a,b) => b.ts - a.ts).map(l => {
    const cls = l.status === 'playing' ? 'lbadge-playing' : l.players >= l.maxPlayers ? 'lbadge-full' : 'lbadge-open';
    const lbl = l.status === 'playing' ? 'EN COURS' : l.players >= l.maxPlayers ? 'PLEIN' : 'OUVERT';
    return `<div class="lobby-card" onclick="join('${l.id}')">
      <span class="lbadge ${cls}">${lbl}</span>
      <h3>${esc(l.name)}</h3>
      <p>👤 ${esc(l.host)} · 👥 ${l.players}/${l.maxPlayers}<br>📐 ${l.gw}×${l.gh}</p>
    </div>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────
function saveName() {
  myName = document.getElementById('nameInput').value.trim() || 'Joueur';
  localStorage.setItem('snakeName', myName);
  showNotif('Sauvegardé : ' + myName, 'success', 2000);
}

function createLobby() {
  if (!myId) return;
  saveName();
  sessionStorage.setItem('snake_isHost', '1');
  sessionStorage.setItem('snake_myId', myId);
  sessionStorage.setItem('snake_name', myName);
  sessionStorage.setItem('snake_targetId', '');
  
  // MODIFIÉ ICI :
  window.location.href = 'game.html'; 
}

function join(hostId) {
  if (!myId) return;
  saveName();
  sessionStorage.setItem('snake_isHost', '0');
  sessionStorage.setItem('snake_myId', myId);
  sessionStorage.setItem('snake_name', myName);
  sessionStorage.setItem('snake_targetId', hostId);
  
  // MODIFIÉ ICI :
  window.location.href = 'game.html'; 
}

// ── Utils ─────────────────────────────────────────────────
function showNotif(msg, type='info', ms=4000) {
  const el = document.createElement('div');
  el.className = 'notif notif-' + type; el.textContent = msg;
  document.getElementById('notifStack').appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, ms);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

initPeer();
setInterval(refresh, 3000);
</script>
</body>
</html>
